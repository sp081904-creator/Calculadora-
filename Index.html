<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #121214;
            color: #ffffff;
        }

        .calculator {
            background-color: #202024;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 360px;
        }

        .display {
            background-color: #121214;
            padding: 16px;
            border-radius: 8px;
            text-align: right;
            margin-bottom: 20px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .previous-op {
            font-size: 14px;
            color: #7c7c8a;
            margin-bottom: 4px;
        }

        .current-op {
            font-size: 32px;
            font-weight: bold;
            word-wrap: break-word;
            word-break: break-all;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            border: none;
            padding: 20px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        /* Cores dos botões */
        .btn-num {
            background-color: #29292e;
            color: #ffffff;
        }

        .btn-num:hover {
            background-color: #323238;
        }

        .btn-op {
            background-color: #00875f;
            color: #ffffff;
        }

        .btn-op:hover {
            background-color: #00b37e;
        }

        .btn-fn {
            background-color: #323238;
            color: #e1e1e6;
        }

        .btn-fn:hover {
            background-color: #4d4d54;
        }

        .btn-equal {
            background-color: #00b37e;
            color: #ffffff;
            grid-column: span 2;
        }

        .btn-equal:hover {
            background-color: #02e09e;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <!-- Visor da Calculadora -->
        <div class="display">
            <div id="previous-operation" class="previous-op"></div>
            <div id="current-operation" class="current-op">0</div>
        </div>

        <!-- Grade de Botões -->
        <div class="buttons-grid">
            <!-- Linha de funções de memória e controle -->
            <button class="btn-fn">MC</button>
            <button class="btn-fn">M+</button>
            <button class="btn-fn">M-</button>
            <button class="btn-fn">C</button>

            <!-- Números e Operadores -->
            <button class="btn-num">7</button>
            <button class="btn-num">8</button>
            <button class="btn-num">9</button>
            <button class="btn-op">/</button>

            <button class="btn-num">4</button>
            <button class="btn-num">5</button>
            <button class="btn-num">6</button>
            <button class="btn-op">*</button>

            <button class="btn-num">1</button>
            <button class="btn-num">2</button>
            <button class="btn-num">3</button>
            <button class="btn-op">-</button>

            <button class="btn-num">0</button>
            <button class="btn-num">.</button>
            <button class="btn-equal">=</button>
            <button class="btn-op">+</button>
        </div>
    </div>

    <!-- Vinculação do banco de dados que você já criou -->
    <script src="script.js"></script>
</body>
</html>
